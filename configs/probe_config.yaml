model:
  backbone_checkpoint: outputs/pretrain/checkpoint_best.pth
  backbone_arch: vit_base_patch16_224
  freeze_backbone: true  # PhyIP: Non-Invasive Physical Probe
  embedding_dim: 768

probe:
  type: linear  # strictly linear — no non-linear activations
  regularization: ridge  # L2 regularization
  alpha: 1.0  # regularization strength
  fit_intercept: true

forecasting:
  horizons: [10, 50, 100, 500]  # ticks ahead
  target: realized_volatility

data:
  lob_levels: 10  # top-k bid/ask levels
  window_size: 100  # temporal window in ticks
  img_size: 224
  stride: 10
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  datasets:
    - name: binance_btcusdt
      path: data/financial/binance_btcusdt.parquet
    - name: fi2010
      path: data/financial/fi2010

evaluation:
  metrics: [mae, rmse, qlike]
  diebold_mariano: true
  newey_west_lags: 10
  significance_level: 0.05

output:
  dir: outputs/probe
  save_embeddings: true
  plot_results: true

deeplob:
  epochs: 50
  patience: 10

hardware:
  device: cuda
  batch_size: 256
  num_workers: 4
