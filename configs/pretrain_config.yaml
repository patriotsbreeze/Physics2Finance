model:
  arch: vit_small_patch16_224  # T4 (16GB): vit_base OOMs at batch=32 with 6 crops
  img_size: 224
  patch_size: 16
  embed_dim: 384               # vit_small embed dim
  depth: 12
  num_heads: 6                 # vit_small heads
  mlp_ratio: 4.0
  in_chans: 3                  # u (price advection), v (volume flux), p (pressure density)

dino:
  out_dim: 65536
  local_crops_number: 4        # reduced from 8 — halves augmentation VRAM cost
  local_crops_scale: [0.05, 0.4]
  global_crops_scale: [0.4, 1.0]
  warmup_teacher_temp: 0.04    # start temp — teacher is sharp early (easy signal)
  teacher_temp: 0.07           # final temp — teacher softens, forcing richer features
  warmup_teacher_temp_epochs: 30
  student_temp: 0.1
  center_momentum: 0.9
  momentum_teacher: 0.996

training:
  epochs: 200                  # 50 was too few — best ckpt was epoch 10, then collapse
  warmup_epochs: 5
  batch_size: 32               # T4 safe with vit_small + 6 crops + fp16
  base_lr: 0.0005
  min_lr: 1.0e-6
  weight_decay: 0.04
  weight_decay_end: 0.4
  clip_grad: 3.0
  freeze_last_layer: 1
  num_workers: 4               # T4 VMs typically have 4 vCPUs
  save_every: 10
  output_dir: outputs/pretrain

data:
  datasets:
    - name: pdearena
      path: data/pdearena       # 2.75 GB already downloaded
  img_size: 224
  channels: [u, v, p]          # x-velocity, y-velocity, pressure — match LOB heatmap
  normalize: true
  augment: true

hardware:
  device: cuda
  fp16: true                   # essential on T4 — halves VRAM
  compile: false

logging:
  wandb: false
  wandb_project: Physics2Finance
  run_name: pretrain_t4_vit_small
